# versions.toml — 版本唯一來源
# keywords 欄位供 rg 搜尋用（例：rg "bun" docs/agent/versions.toml）
# 更新任一版本時，同時更新對應 docs/reference/*.md 與 docs/getting-started.md
#
# source = 官方版本查詢連結（npm registry 或 GitHub releases）。
# 貢獻者只需點開 source 確認是否有更新版本並回報，實際測試與合併由維護者處理。
# 注意 npm 套件名稱 ≠ 工具名稱：rsbuild→@rsbuild/core、oRPC→@orpc/server、
# Drizzle→drizzle-orm、TanStack Start→@tanstack/react-start。請點 source 連結，勿自行猜測。

[runtime.bun]
version = "1.3.14"
status = "stable"
updated = "2026-07-10"
source = "https://github.com/oven-sh/bun/releases"
keywords = ["runtime", "javascript", "typescript"]
note = "Anthropic 收購 (2025-12). Rust 重寫完成 (2026-07-08)."

