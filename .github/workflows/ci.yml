name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  typecheck-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
      - run: nix profile install nixpkgs#devenv
      - run: devenv allow
      - run: |
          set +e
          devenv shell -- devenv tasks run typecheck:backend typecheck:frontend
          EXIT_CODE=$?
          set -e
          echo "typecheck exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" -gt 1 ]; then exit "$EXIT_CODE"; fi

  typecheck-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          extra_nix_config: sandbox = false
      - run: ulimit -n 8192
      - run: nix profile install nixpkgs#devenv
      - run: devenv allow
      - run: |
          set +e
          devenv shell -- devenv tasks run typecheck:backend typecheck:frontend
          EXIT_CODE=$?
          set -e
          echo "typecheck exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" -gt 1 ]; then exit "$EXIT_CODE"; fi

  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - run: |
          Write-Host "  -> Checking PowerShell script syntax ..."
          $errors = $null
          $parsed = [System.Management.Automation.Language.Parser]::ParseFile(
            "scripts/start-windows.ps1", [ref] $errors, [ref] $null
          )
          if ($errors) {
            foreach ($e in $errors) { Write-Error $e.Message }
            exit 1
          }
          Write-Host "  ✓ scripts/start-windows.ps1 syntax OK"
        shell: powershell
      - run: |
          Write-Host "  -> Checking start.sh for Windows/WSL detection ..."
          Select-String -Path scripts/start.sh -Pattern "wsl2|windows|WSL" | ForEach-Object {
            Write-Host "  ✓ $($_.LineNumber): $($_.Line.Trim())"
          }
          Write-Host "  ✓ WSL detection present"
        shell: powershell
