name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config files present and parseable
        run: |
          errors=0
          for f in Justfile secretspec.toml .prettierrc.json .editorconfig; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          for f in flake.nix flake.lock devenv.nix devenv.lock; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          for f in apps/backend/tsconfig.json apps/backend/package.json; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          npx --yes json5 < .prettierrc.json > /dev/null 2>&1 && echo "OK  .prettierrc.json (valid)"
          exit $errors

      - name: Lock files parseable
        run: |
          python3 - <<'PY'
          import json
          with open('flake.lock') as f:
              fl = json.load(f)
          with open('devenv.lock') as f:
              dl = json.load(f)
          assert 'nixpkgs' in fl['nodes'], "flake.lock missing nixpkgs input"
          assert any('devenv' in k for k in dl.get('nodes', {})), "devenv.lock missing"
          print("lock files OK")
          PY

      - name: Nix flake eval (no build)
        run: nix eval .#bun.outPath --impure 2>&1 | head -3

  devenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Build environment
        run: devenv shell -- bun --version
