name: CI

on:
  push:
    branches: [dev, main, experiment/devenv-tasks]
  pull_request:
    branches: [main]

jobs:
  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config files present and parseable
        run: |
          errors=0
          for f in Justfile secretspec.toml .editorconfig package.json; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          for f in devenv.nix devenv.lock; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          for f in apps/backend/tsconfig.json apps/backend/package.json; do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISS  $f"; errors=$((errors+1)); fi
          done
          python3 -c "import json; json.load(open('devenv.lock'))" && echo "OK  devenv.lock (valid)"
          exit $errors

      - name: Validate Bun lockfile
        run: python3 -c "import json; json.load(open('bun.lock'))" && echo "OK  bun.lock (valid)"

  devenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Build environment
        run: devenv shell -- bun --version

  blank-macos:
    if: github.ref == 'refs/heads/experiment/devenv-tasks'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            max-substitution-jobs = 128
            http-connections = 128

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Time devenv test (first cold build)
        run: |
          SECONDS=0
          devenv test
          echo "devenv test completed in $SECONDS seconds"
          echo "time=$SECONDS" >> $GITHUB_OUTPUT
