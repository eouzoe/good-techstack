name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Validate the project's own dev-environment configuration.
  # (The lint / typecheck / test matrix is what spawned projects run via `just`.)
  verify-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: devenv environment evaluates
        run: devenv shell -- which bun oxlint oxfmt tsc prettier wrangler node

      - name: flake packages build
        run: nix build .#bun

      - name: Agent / config files present
        run: |
          test -f CLAUDE.md && echo "CLAUDE.md OK"
          test -f AGENTS.md && echo "AGENTS.md OK"
          test -f Justfile && echo "Justfile OK"
          test -f secretspec.toml && echo "secretspec.toml OK"

      - name: Lock files present and parse
        run: |
          python3 - <<'PY'
          import json
          fl = json.load(open('flake.lock'))
          dl = json.load(open('devenv.lock'))
          assert 'nixpkgs' in fl['nodes'], "flake.lock missing nixpkgs input"
          assert any('devenv' in k for k in dl.get('nodes', {})), "devenv.lock missing devenv input"
          print("lock files OK: flake.nixpkgs=%s devenv.lock=%s" % (
            fl['nodes']['nixpkgs']['locked']['rev'][:8],
            [k for k in dl['nodes'] if 'devenv' in k][0][:8]))
          PY
