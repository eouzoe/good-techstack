[project]
name = "good-techstack"
revision = "1.0"

# Default profile — always loaded first.
# Declare what the stack needs; values are set at runtime via
#   secretspec secret set <NAME> "<value>"
# (see README.md "Start" section). Never commit values.
[profiles.default]
DATABASE_URL = { description = "D1 database URL (production)", required = false }
SESSION_SECRET = { description = "Session signing key for better-auth", required = false }
CLOUDFLARE_API_TOKEN = { description = "Cloudflare API token for wrangler deploy", required = false }
CLOUDFLARE_ACCOUNT_ID = { description = "Cloudflare account ID", required = false }
BETTER_AUTH_SECRET = { description = "better-auth secret key", required = false }
BETTER_AUTH_URL = { description = "better-auth base URL", required = false }
PUBLIC_APP_URL = { description = "Public-facing application URL", required = false }
