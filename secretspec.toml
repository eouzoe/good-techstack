[project]
name = "good-techstack"
revision = "1.0"

# Default profile — always loaded first.
# Declare what the stack needs; values are set at runtime via
#   secretspec secret set <NAME> "<value>"
# (see README.md "Start" section). Never commit values.
[profiles.default]
DATABASE_URL = { description = "D1 database URL (production)", required = true }
SESSION_SECRET = { description = "Session signing key for better-auth", required = true }
CLOUDFLARE_API_TOKEN = { description = "Cloudflare API token for wrangler deploy", required = true }
CLOUDFLARE_ACCOUNT_ID = { description = "Cloudflare account ID", required = true }
BETTER_AUTH_SECRET = { description = "better-auth secret key", required = true }
BETTER_AUTH_URL = { description = "better-auth base URL", required = true }
PUBLIC_APP_URL = { description = "Public-facing application URL", required = true }
