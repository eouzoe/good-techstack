inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-unstable
  devenv:
    url: github:cachix/devenv?ref=v2.1.2
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs

require_version: ">=2.1.2"

# Secret resolution via secretspec.toml (provider: env = reads process env,
# no crash on missing keys — uses `or ""` in devenv.nix).
secretspec:
  enable: true
  provider: env
  profile: default

# Fail loudly on port conflicts instead of silently remapping (prevents
# devenv's sticky fallback-port behaviour from hiding collisions).
strict_ports: true

# Local: `SECRETSPEC_PROVIDER=keyring secretspec config init` for encrypted
# keychain storage. CI: inject secrets as GitHub Actions env vars.
