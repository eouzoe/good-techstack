inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-unstable
  devenv:
    url: github:cachix/devenv?ref=v2.1.2
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs

require_version: ">=2.1.2"

# SecretSpec: secretspec.toml declares WHAT secrets the app needs.
# We do NOT force `secretspec.enable = true` here — that would make
# every `devenv shell` require a configured provider + set secrets,
# which breaks `devenv test` / CI and fresh clones.
# Instead the developer loads secrets on demand via:
#   secretspec config init          # one-time: pick a provider backend
#   secretspec secret set KEY "..."  # store each secret
#   secretspec run -- devenv shell -- just dev   # loads + enters
# (or `devenv shell` after secrets are stored — the CLI auto-enables
#  integration only when secrets are actually present.)
